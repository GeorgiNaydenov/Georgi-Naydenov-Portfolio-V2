<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    {% seo %}

    <!-- Shared styles -->
    <link rel="stylesheet" href="{{ '/styles/tokens.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/styles/blog.css' | relative_url }}">

    <!-- Favicons -->
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" sizes="32x32">
    <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

    {% feed_meta %}

    {% include head.html %}
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans">
    {% include header-blog.html %}

    <main>
        {{ content }}
    </main>

    {% include footer-blog.html %}
</body>
</html>
