<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="{{ '/' | relative_url }}" class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-1.5 rounded-lg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15z"/>
                    </svg>
                </div>
                <div>
                    <span class="font-bold text-slate-900 dark:text-white">Georgi Naydenov</span>
                    <span class="hidden sm:inline text-xs text-slate-500 dark:text-slate-400 ml-2">Portfolio & Blog</span>
                </div>
            </a>
            <nav class="flex items-center gap-4">
                <a href="{{ '/' | relative_url }}" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Portfolio</a>
                <a href="{{ '/blog/' | relative_url }}" class="text-sm font-medium {% if page.url contains '/blog' %}text-blue-600 dark:text-blue-400{% else %}text-slate-600 dark:text-slate-400{% endif %} hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Blog</a>
                <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">LinkedIn</a>
            </nav>
        </div>
    </div>
</header>
